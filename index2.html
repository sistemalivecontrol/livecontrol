    <!-- Script V3 - injeta CSS como ultimo stylesheet -->
    <script>
      (function() {
        var cssRules = '.logo,[class*="logo"]:not([class*="container"]):not([class*="wrapper"]):not([class*="icon"]){color:#fff!important;display:inline-flex!important;align-items:center!important;white-space:nowrap!important;overflow:visible!important;min-width:max-content!important}.logo span,[class*="logo"]>span,.logo>span{color:#fff!important;-webkit-text-fill-color:#fff!important;display:inline!important;white-space:nowrap!important}.logo span:last-child,.logo span:nth-child(2),.logo .live,.logo .Live,.logo .highlight,.logo .accent,.logo [class*="live"],.logo [class*="Live"],.logo [class*="accent"],.logo [class*="highlight"],.logo [class*="yellow"],.logo [class*="amber"],.logo [class*="gold"],.logo [class*="primary"]{color:#fff!important;-webkit-text-fill-color:#fff!important}.logo svg *{stroke:#fff!important;fill:#fff!important}.logo svg text{fill:#fff!important}';

        function injectCSS() {
          var e = document.getElementById('logo-fix-final-v3');
          if (e) e.remove();
          var s = document.createElement('style');
          s.id = 'logo-fix-final-v3';
          s.textContent = cssRules;
          document.head.appendChild(s);
        }

        function forceWhite(el) {
          if (!el) return;
          el.style.setProperty('color', '#ffffff', 'important');
          el.style.setProperty('-webkit-text-fill-color', '#ffffff', 'important');
        }

        function fixAll() {
          injectCSS();
          document.querySelectorAll('.logo, [class*="logo"]').forEach(function(el) {
            forceWhite(el);
            el.style.setProperty('overflow', 'visible', 'important');
            el.style.setProperty('white-space', 'nowrap', 'important');
            el.style.setProperty('min-width', 'max-content', 'important');
            el.querySelectorAll('span').forEach(forceWhite);
            el.querySelectorAll('svg *').forEach(function(s) {
              s.style.setProperty('stroke', '#ffffff', 'important');
              s.style.setProperty('fill', '#ffffff', 'important');
            });
          });
          document.querySelectorAll('span').forEach(function(span) {
            var t = span.textContent.trim();
            if (t === 'Live' || t === 'live') {
              var p = span.parentElement;
              if (p && (p.classList.contains('logo') || p.className.indexOf('logo') !== -1 || p.className.indexOf('brand') !== -1)) {
                forceWhite(span);
              }
            }
          });
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', fixAll);
        } else {
          fixAll();
        }

        [50, 100, 200, 300, 500, 800, 1000, 1500, 2000, 3000, 5000].forEach(function(t) {
          setTimeout(fixAll, t);
        });

        var iid = setInterval(fixAll, 300);
        setTimeout(function() { clearInterval(iid); }, 30000);

        var obs = new MutationObserver(fixAll);
        if (document.body) {
          obs.observe(document.body, { childList: true, subtree: true, attributes: true, attributeFilter: ['style', 'class'] });
        } else {
          document.addEventListener('DOMContentLoaded', function() {
            obs.observe(document.body, { childList: true, subtree: true, attributes: true, attributeFilter: ['style', 'class'] });
          });
        }
      })();
    </script>
