  <body>
    <div id="root"></div>

    <!-- Script de correção dinâmica após React renderizar -->
    <script>
      (function() {
        function fixLogo() {
          // Procura por todos os possíveis logos
          var selectors = [
            '.logo', '.brand', '.nav-logo', '.header-logo', '.site-logo', '.brand-name',
            '[class*="logo"]', '[class*="brand"]'
          ];

          selectors.forEach(function(sel) {
            var elements = document.querySelectorAll(sel);
            elements.forEach(function(el) {
              // Força estilos inline (mais específico que CSS)
              el.style.overflow = 'visible';
              el.style.whiteSpace = 'nowrap';
              el.style.minWidth = 'max-content';
              el.style.maxWidth = 'none';
              el.style.width = 'auto';
              el.style.flexShrink = '0';
              el.style.textOverflow = 'clip';

              // Procura spans dentro do logo
              var spans = el.querySelectorAll('span');
              spans.forEach(function(span, index) {
                span.style.display = 'inline';
                span.style.whiteSpace = 'nowrap';
                span.style.overflow = 'visible';

                // Todos os spans brancos
                span.style.color = '#ffffff';
                span.style.fontWeight = '700';
              });

              // Forçar SVG do ícone branco
              var svgElements = el.querySelectorAll('svg *');
              svgElements.forEach(function(el) {
                el.style.stroke = '#ffffff';
                el.style.fill = '#ffffff';
              });
              // Se o logo tiver SVG com texto
              var texts = el.querySelectorAll('text');
              texts.forEach(function(text, index) {
                text.style.fill = '#ffffff';
              });
            });
          });
        }

        // Executa após carregamento
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', fixLogo);
        } else {
          fixLogo();
        }

        // Reexecuta após 1s e 3s (React pode renderizar depois)
        setTimeout(fixLogo, 1000);
        setTimeout(fixLogo, 3000);

        // Observa mudanças no DOM (React re-renderiza)
        var observer = new MutationObserver(function(mutations) {
          fixLogo();
        });

        observer.observe(document.body, {
          childList: true,
          subtree: true,
          attributes: true
        });
      })();
    </script>
