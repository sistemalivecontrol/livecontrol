<script>
// ==========================================
// SESSION.JS - Sistema de Sessao Unificado
// Verifica login em TODAS as paginas protegidas
// v1.0 - Sessao unica via localStorage + Supabase
// ==========================================

(function() {
    'use strict';

    // ===== CONFIG =====
    const SUPABASE_URL = 'https://aqrvozmxlcgrllclceke.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFxcnZvem14bGNncmxsY2xjZWtlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNTk0MDEsImV4cCI6MjA5MTgzNTQwMX0.6CL3-1dU6WUT4EbJ0UfvmLFj6jGPnT9Avc743WrNiCA';
    const LOGIN_PAGE = 'login.html';
    const SESSAO_KEY = 'usuarioLogado';

    // ===== DETECTAR SE ESTAMOS EM UMA PAGINA PUBLICA =====
    const path = window.location.pathname.toLowerCase();
    const href = window.location.href.toLowerCase();
    const paginasPublicas = [
        'login.html',
        'solicitacao-entrega.html',
        'solicitacoes.html',
        'solicitacoes1.html',
        'coblive.html',
        'pix-pagamento.html',
        'pix-sucesso.html',
        'links.html',
        'index.html',
        'index2.html'
    ];

    function ehPaginaPublica() {
        // Se esta na raiz (index)
        if (path === '/' || path.endsWith('/index.html') || path.endsWith('/index2.html')) return true;
        // Verifica lista de paginas publicas
        for (const pagina of paginasPublicas) {
            if (path.includes(pagina) || href.includes(pagina)) return true;
        }
        return false;
    }

    // ===== VERIFICACAO SINCRONA IMEDIATA =====
    // Esta e a parte mais importante - executa ANTES de qualquer coisa
    function verificarSessaoSincrona() {
        // Nao verifica em paginas publicas
        if (ehPaginaPublica()) {
            console.log('[SESSION] Pagina publica detectada - sem verificacao');
            return true;
        }

        try {
            const sessaoRaw = localStorage.getItem(SESSAO_KEY);
            if (!sessaoRaw) {
                console.log('[SESSION] Sem sessao - redirecionando para login');
                redirecionarParaLogin();
                return false;
            }

            const sessao = JSON.parse(sessaoRaw);
            if (!sessao || !sessao.auth_id || !sessao.usuario_id) {
                console.log('[SESSION] Sessao invalida - redirecionando');
                limparSessao();
                redirecionarParaLogin();
                return false;
            }

            // Verificar se a sessao nao expirou (24 horas)
            if (sessao.login_time) {
                const loginTime = new Date(sessao.login_time).getTime();
                const agora = Date.now();
                const vinteQuatroHoras = 24 * 60 * 60 * 1000;
                if ((agora - loginTime) > vinteQuatroHoras) {
                    console.log('[SESSION] Sessao expirada (24h)');
                    limparSessao();
                    redirecionarParaLogin();
                    return false;
                }
            }

            // Sessao valida!
            console.log('[SESSION] Sessao valida:', sessao.nome || sessao.email);
            window.sessaoUsuario = sessao;
            window.authClienteId = sessao.cliente_id;
            return true;
        } catch (e) {
            console.error('[SESSION] Erro ao verificar sessao:', e);
            limparSessao();
            redirecionarParaLogin();
            return false;
        }
    }

    function redirecionarParaLogin() {
        // Evitar loop de redirecionamento
        if (window.location.href.includes(LOGIN_PAGE)) return;
        localStorage.setItem('logoutTimestamp', Date.now());
            localStorage.setItem('logoutTimestamp', Date.now());
            window.location.replace(LOGIN_PAGE);
    }

    function limparSessao() {
        localStorage.removeItem(SESSAO_KEY);
        localStorage.removeItem('clienteId');
        localStorage.removeItem('nivelAcesso');
        sessionStorage.clear();
    }

    // ===== INICIALIZACAO DO SUPABASE =====
    let supabaseInicializado = false;
    let supabaseInitPromise = null;

    function detectarSupabase() {
        const possiveis = [
            typeof supabase !== 'undefined' ? supabase : null,
            typeof window !== 'undefined' && window.supabase ? window.supabase : null,
            typeof window !== 'undefined' && window.supabaseClient ? window.supabaseClient : null
        ];
        for (const lib of possiveis) {
            if (lib && lib.createClient) return lib;
        }
        return null;
    }

    async function inicializarSupabase() {
        if (supabaseInicializado && window.supabaseClient) return true;
        if (supabaseInitPromise) return supabaseInitPromise;

        supabaseInitPromise = (async () => {
            try {
                // Verificar se ja existe um client Supabase
                if (window.supabaseClient) {
                    supabaseInicializado = true;
                    return true;
                }

                // Tentar detectar a biblioteca Supabase
                let supabaseLib = detectarSupabase();

                // Se nao encontrou, tentar carregar do CDN
                if (!supabaseLib) {
                    console.log('[SESSION] Carregando Supabase do CDN...');
                    await carregarScript('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js');
                    supabaseLib = detectarSupabase();
                }

                if (!supabaseLib) {
                    console.error('[SESSION] Nao foi possivel carregar Supabase');
                    return false;
                }

                window.supabaseClient = supabaseLib.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
                    auth: {
                        autoRefreshToken: true,
                        persistSession: true,
                        detectSessionInUrl: false
                    }
                });

                // Sincronizar com a sessao do Supabase Auth
                try {
                    const { data: { session } } = await window.supabaseClient.auth.getSession();
                    if (!session) {
                        // Supabase nao tem sessao, mas localStorage tem - tentar restaurar
                        console.log('[SESSION] Supabase sem sessao, mas localStorage tem');
                    }
                } catch (e) {
                    // Ignorar erro
                }

                supabaseInicializado = true;
                console.log('[SESSION] Supabase inicializado');
                return true;
            } catch (err) {
                console.error('[SESSION] Erro ao inicializar Supabase:', err);
                return false;
            }
        })();

        return supabaseInitPromise;
    }

    function carregarScript(src) {
        return new Promise((resolve, reject) => {
            // Verificar se o script ja existe
            const existente = document.querySelector(`script[src*="supabase"]`);
            if (existente) {
                // Aguardar carregamento
                if (detectarSupabase()) {
                    resolve();
                    return;
                }
                existente.addEventListener('load', () => resolve());
                existente.addEventListener('error', () => reject());
                return;
            }

            const script = document.createElement('script');
            script.src = src;
            script.crossOrigin = 'anonymous';
            script.onload = () => resolve();
            script.onerror = () => reject(new Error('Falha ao carregar: ' + src));
            document.head.appendChild(script);
        });
    }

    // ===== API PUBLICA =====
    const sessaoAPI = {
        // Dados do usuario logado
        get usuario() { return window.sessaoUsuario || null; },
        get clienteId() { return window.sessaoUsuario?.cliente_id || null; },
        get usuarioId() { return window.sessaoUsuario?.usuario_id || null; },
        get nome() { return window.sessaoUsuario?.nome || ''; },
        get email() { return window.sessaoUsuario?.email || ''; },
        get nivelAcesso() { return window.sessaoUsuario?.nivel_acesso || ''; },
        get authId() { return window.sessaoUsuario?.auth_id || null; },

        // Verificar se esta autenticado
        estaAutenticado() {
            return !!window.sessaoUsuario && !!window.sessaoUsuario.auth_id;
        },

        // Obter cliente Supabase (inicializa se necessario)
        async getSupabase() {
            await inicializarSupabase();
            return window.supabaseClient;
        },

        // Verificar se Supabase esta pronto
        get supabasePronto() { return supabaseInicializado; },

        // Logout unificado
        async logout() {
            console.log('[SESSION] Realizando logout...');
            try {
                if (window.supabaseClient) {
                    await window.supabaseClient.auth.signOut();
                }
            } catch (e) {
                // Ignorar erro no signOut
            }
            limparSessao();
            window.sessaoUsuario = null;
            window.authClienteId = null;
            window.authUsuario = null;
            localStorage.setItem('logoutTimestamp', Date.now());
            localStorage.setItem('logoutTimestamp', Date.now());
            window.location.replace(LOGIN_PAGE);
        },

        // Atualizar dados da sessao
        atualizar(dados) {
            const atual = window.sessaoUsuario || {};
            const novo = { ...atual, ...dados, login_time: new Date().toISOString() };
            window.sessaoUsuario = novo;
            localStorage.setItem(SESSAO_KEY, JSON.stringify(novo));
        },

        // Verificar permissao (admin, etc)
        temPermissao(nivel) {
            return (window.sessaoUsuario?.nivel_acesso || '').toLowerCase() === nivel.toLowerCase();
        },

        // Recarregar dados do usuario do banco
        async recarregar() {
            const sb = await inicializarSupabase();
            if (!sb) return false;

            try {
                const { data: { session } } = await window.supabaseClient.auth.getSession();
                if (!session) {
                    this.logout();
                    return false;
                }

                const { data: usuario } = await window.supabaseClient
                    .from('usuarios_pg')
                    .select('*, clientes_sistema(nome, ativo, data_expiracao)')
                    .eq('auth_id', session.user.id)
                    .eq('ativo', true)
                    .single();

                if (!usuario) {
                    this.logout();
                    return false;
                }

                this.atualizar({
                    usuario_id: usuario.id,
                    nome: usuario.nome,
                    email: usuario.email,
                    cliente_id: usuario.cliente_id,
                    nivel_acesso: usuario.nivel_acesso
                });

                return true;
            } catch (e) {
                console.error('[SESSION] Erro ao recarregar:', e);
                return false;
            }
        }
    };

    // Expor globalmente
    window.sessao = sessaoAPI;
    window.sessionGuard = {
        verificar: verificarSessaoSincrona,
        inicializarSupabase: inicializarSupabase
    };

    // ===== INICIALIZACAO =====
    // 1. Verificacao sincrona IMEDIATA (antes de tudo)
    const sessaoValida = verificarSessaoSincrona();

    // 2. Se sessao valida, inicializar Supabase quando DOM estiver pronto
    if (sessaoValida && !ehPaginaPublica()) {
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                inicializarSupabase();
            });
        } else {
            // DOM ja carregou, inicializar agora
            inicializarSupabase();
        }

        // Tambem inicializar imediatamente se Supabase ja estiver disponivel
        if (detectarSupabase()) {
            inicializarSupabase();
        }
    }

    console.log('[SESSION] session.js carregado - Sessao unificada ativa');
})();
</script>

        .empty-state {
            text-align: center;
            padding: 60px;
            color: #636E72;
        }
        .empty-state-icon { font-size: 4rem; margin-bottom: 20px; }
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #2D3436;
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            display: none;
            align-items: center;
            gap: 10px;
            z-index: 2000;
            animation: slideIn 0.3s ease;
        }
        .toast.show { display: flex; }
        .toast.success { background: linear-gradient(135deg, #27ae60, #229954); }
        .toast.error { background: linear-gradient(135deg, #e74c3c, #c0392b); }
        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @media (max-width: 768px) {
            .search-grid { grid-template-columns: 1fr; }
            .form-grid { grid-template-columns: 1fr; }
            .cliente-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
            .cliente-actions {
                width: 100%;
                justify-content: flex-end;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <button class="btn-voltar" id="btnVoltar">← Voltar</button>
                <div class="header-center">
                    <h1>👥 Gerenciamento de Clientes</h1>
                    <p>Cadastro e gestão de clientes e endereços</p>
                </div>
            </div>
            <div class="user-info">
                <span id="userInfo">👤 Carregando...</span>
                <button class="btn-logout" onclick="window.fazerLogout()">🚪 Sair</button>
            </div>
        </div>
        <div class="content">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Total de Clientes</div>
                    <div class="stat-value" id="statTotalClientes">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total de Endereços</div>
                    <div class="stat-value" id="statTotalEnderecos">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Novos este Mês</div>
                    <div class="stat-value" id="statClientesMes">-</div>
                </div>
            </div>
            <div class="search-section">
                <div class="search-grid">
                    <div class="form-group">
                        <label for="buscaNome">Nome ou CPF</label>
                        <input type="text" id="buscaNome" placeholder="Digite nome ou CPF...">
                    </div>
                    <div class="form-group">
                        <label for="buscaCidade">Cidade</label>
                        <input type="text" id="buscaCidade" placeholder="Digite a cidade...">
                    </div>
                    <div class="form-group">
                        <label for="buscaRegiao">Região</label>
                        <select id="buscaRegiao">
                            <option value="">Todas</option>
                            <option value="Norte">Norte</option>
                            <option value="Sul">Sul</option>
                            <option value="Leste">Leste</option>
                            <option value="Oeste">Oeste</option>
                            <option value="Centro">Centro</option>
                        </select>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn-buscar" onclick="buscarClientes()">🔍 Buscar</button>
                        <button class="btn-limpar" onclick="limparBusca()">Limpar</button>
                    </div>
                </div>
            </div>
            <button class="btn-novo" onclick="abrirModalCliente()">➕ Novo Cliente</button>
            <div class="clientes-list" id="listaClientes">
                <div class="loading"><div>Carregando clientes...</div></div>
            </div>
        </div>
    </div>
    <div class="modal-overlay" id="modalCliente">
        <div class="modal">
            <div class="modal-header"><h2 id="modalClienteTitulo">Novo Cliente</h2></div>
            <div class="modal-body">
                <form id="formCliente" class="form-grid">
                    <input type="hidden" id="clienteId">
                    <div class="form-group"><label for="nome">Nome *</label><input type="text" id="nome" required maxlength="100"></div>
                    <div class="form-group"><label for="cpf">CPF</label><input type="text" id="cpf" maxlength="14" placeholder="000.000.000-00"></div>
                    <div class="form-group"><label for="whatsapp">WhatsApp</label><input type="text" id="whatsapp" maxlength="20" placeholder="(00) 00000-0000"></div>
                    <div class="form-group"><label for="instagram">Instagram</label><input type="text" id="instagram" maxlength="50" placeholder="@usuario"></div>
                    <div class="form-group full-width"><label for="email">E-mail</label><input type="email" id="email" maxlength="255"></div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-cancelar" onclick="fecharModalCliente()">Cancelar</button>
                <button class="btn-salvar" onclick="salvarCliente()">Salvar Cliente</button>
            </div>
        </div>
    </div>
    <div class="modal-overlay" id="modalEndereco">
        <div class="modal">
            <div class="modal-header" style="background: #0B193F;"><h2 id="modalEnderecoTitulo">Novo Endereço</h2></div>
            <div class="modal-body">
                <form id="formEndereco" class="form-grid">
                    <input type="hidden" id="enderecoId">
                    <input type="hidden" id="enderecoClienteId">
                    <div class="form-group"><label for="cep">CEP *</label><input type="text" id="cep" required maxlength="9" placeholder="00000-000"></div>
                    <div class="form-group"><label for="rua">Rua *</label><input type="text" id="rua" required maxlength="100"></div>
                    <div class="form-group"><label for="numero">Número</label><input type="text" id="numero" maxlength="50"></div>
                    <div class="form-group"><label for="complemento">Complemento</label><input type="text" id="complemento" maxlength="100" placeholder="Apto, Bloco, etc"></div>
                    <div class="form-group"><label for="bairro">Bairro</label><input type="text" id="bairro" maxlength="50"></div>
                    <div class="form-group"><label for="cidade">Cidade *</label><input type="text" id="cidade" required maxlength="50"></div>
                    <div class="form-group"><label for="estado">Estado</label><input type="text" id="estado" maxlength="2" value="SC"></div>
                    <div class="form-group"><label for="regiao">Região</label>
                        <select id="regiao">
                            <option value="">Selecione...</option>
                            <option value="Norte">Norte</option>
                            <option value="Sul">Sul</option>
                            <option value="Leste">Leste</option>
                            <option value="Oeste">Oeste</option>
                            <option value="Centro">Centro</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-cancelar" onclick="fecharModalEndereco()">Cancelar</button>
                <button class="btn-salvar" onclick="salvarEndereco()">Salvar Endereço</button>
            </div>
        </div>
    </div>
    <div class="toast" id="toast"></div>
    <script>
        // ==========================================
        // VARIÁVEIS GLOBAIS
        // ==========================================
        let supabaseClient = null;
        let usuarioAtual = null;
        let clienteSistemaId = null;
        let clientesData = [];
        let appInicializado = false;
        let carregandoClientes = false;

        // ==========================================
        // INICIALIZAÇÃO - Mesmo padrão do vendas.html
        // ==========================================
        function inicializarApp() {
            if (appInicializado) {
                console.log('[CLIENTES] App já inicializado');
                return;
            }

            // Usar variáveis globais do auth.js
            supabaseClient = window.supabaseClient;
            clienteSistemaId = window.authClienteId;

            if (!clienteSistemaId) {
                console.log('[CLIENTES] ⏳ auth.js ainda não definiu clienteId, aguardando...');
                return false;
            }

            appInicializado = true;
            console.log('[CLIENTES] ✅ Inicializando app com clienteId:', clienteSistemaId);
            carregarDados();
            return true;
        }

        // Aguardar auth.js inicializar (ele já fez autenticação e redirecionamento se necessário)
        document.addEventListener('DOMContentLoaded', () => {
            let tentativas = 0;
            const maxTentativas = 100; // 10 segundos máximo

            const checkAuth = setInterval(() => {
                tentativas++;

                // Tentar inicializar - retorna false se ainda não está pronto
                const iniciado = inicializarApp();

                if (iniciado) {
                    clearInterval(checkAuth);
                    console.log('[CLIENTES] ✅ App inicializado com sucesso');
                } else if (tentativas >= maxTentativas) {
                    clearInterval(checkAuth);
                    console.error('[CLIENTES] Timeout aguardando auth.js');
                    mostrarToast('Erro ao inicializar. Recarregue a página.', 'error');
                }
            }, 100);
        });

        // ============================================
        // NAVEGAÇÃO - VOLTAR PARA DASHBOARD
        // ============================================
        document.getElementById('btnVoltar').addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            location.href = 'dashboard.html';
            return false;
        });

        // ==========================================
        // CARREGAMENTO DE DADOS
        // ==========================================
        async function carregarDados() {
            await Promise.all([carregarEstatisticas(), buscarClientes()]);
        }

        async function carregarEstatisticas() {
            try {
                const { count: totalClientes } = await supabaseClient.from('clientes_pg').select('*', { count: 'exact', head: true }).eq('cliente_id', clienteSistemaId);
                const { count: totalEnderecos } = await supabaseClient.from('enderecos_pg').select('*', { count: 'exact', head: true }).eq('cliente_id', clienteSistemaId);
                const inicioMes = new Date();
                inicioMes.setDate(1);
                inicioMes.setHours(0, 0, 0, 0);
                const { count: clientesMes } = await supabaseClient.from('clientes_pg').select('*', { count: 'exact', head: true }).eq('cliente_id', clienteSistemaId).gte('criado_em', inicioMes.toISOString());
                document.getElementById('statTotalClientes').textContent = totalClientes || 0;
                document.getElementById('statTotalEnderecos').textContent = totalEnderecos || 0;
                document.getElementById('statClientesMes').textContent = clientesMes || 0;
            } catch (error) {
                console.error('[CLIENTES] Erro ao carregar estatísticas:', error);
            }
        }

        async function buscarClientes() {
            if (carregandoClientes) {
                console.log('[CLIENTES] Carregamento já em andamento');
                return;
            }
            carregandoClientes = true;

            const nome = document.getElementById('buscaNome').value.trim();
            const cidade = document.getElementById('buscaCidade').value.trim();
            const regiao = document.getElementById('buscaRegiao').value;

            try {
                let query = supabaseClient.from('clientes_pg').select(`*,enderecos_pg (*)`).eq('cliente_id', clienteSistemaId).order('nome');
                if (nome) {
                    const cpfLimpo = nome.replace(/\D/g, '');
                    if (cpfLimpo.length > 0) {
                        query = query.or(`nome.ilike.%${nome}%,cpf.ilike.%${nome}%`);
                    } else {
                        query = query.ilike('nome', `%${nome}%`);
                    }
                }
                const { data: clientes, error } = await query;
                if (error) throw error;

                let clientesFiltrados = clientes || [];
                if (cidade || regiao) {
                    clientesFiltrados = clientesFiltrados.filter(cliente => {
                        const enderecos = cliente.enderecos_pg || [];
                        return enderecos.some(end => {
                            const matchCidade = !cidade || (end.cidade && end.cidade.toLowerCase().includes(cidade.toLowerCase()));
                            const matchRegiao = !regiao || end.regiao === regiao;
                            return matchCidade && matchRegiao;
                        });
                    });
                }
                clientesData = clientesFiltrados;
                renderizarClientes(clientesFiltrados);
            } catch (error) {
                console.error('[CLIENTES] Erro ao buscar clientes:', error);
                mostrarToast('Erro ao buscar clientes', 'error');
            } finally {
                carregandoClientes = false;
            }
        }

        function renderizarClientes(clientes) {
            const container = document.getElementById('listaClientes');
            if (clientes.length === 0) {
                container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🔍</div><h3>Nenhum cliente encontrado</h3><p>Tente ajustar os filtros de busca ou cadastre um novo cliente.</p></div>`;
                return;
            }
            container.innerHTML = clientes.map(cliente => {
                const enderecos = cliente.enderecos_pg || [];
                const enderecoPrincipal = enderecos.find(e => e.ativo) || enderecos[0];
                return `<div class="cliente-item" data-id="${cliente.id}">
                    <div class="cliente-header" onclick="toggleDetalhes('${cliente.id}')">
                        <div class="cliente-info">
                            <div class="cliente-nome">${escapeHtml(cliente.nome)}</div>
                            <div class="cliente-dados">
                                <span>🆔 ${formatarCPF(cliente.cpf)}</span>
                                ${cliente.whatsapp ? `<span>📱 ${escapeHtml(cliente.whatsapp)}</span>` : ''}
                                ${enderecoPrincipal ? `<span>📍 ${escapeHtml(enderecoPrincipal.cidade)}/${escapeHtml(enderecoPrincipal.estado)}</span>` : ''}
                                <span>🏠 ${enderecos.length} endereço(s)</span>
                            </div>
                        </div>
                        <div class="cliente-actions">
                            <button class="btn-icon btn-editar" onclick="event.stopPropagation(); editarCliente('${cliente.id}')" title="Editar">✏️</button>
                            <button class="btn-icon btn-excluir" onclick="event.stopPropagation(); excluirCliente('${cliente.id}')" title="Excluir">🗑️</button>
                            <button class="btn-icon btn-expand" onclick="event.stopPropagation(); toggleDetalhes('${cliente.id}')" title="Ver detalhes">▼</button>
                        </div>
                    </div>
                    <div class="cliente-detalhes" id="detalhes-${cliente.id}">
                        <div class="secao-enderecos">
                            <h3 class="secao-titulo">📍 Endereços</h3>
                            ${enderecos.length === 0 ? '<p style="color: #636E72;">Nenhum endereço cadastrado</p>' : ''}
                            ${enderecos.map(end => `
                                <div class="endereco-card">
                                    <div class="endereco-info">
                                        <div class="endereco-principal">
                                            ${escapeHtml(end.rua)}, ${escapeHtml(end.numero || 'S/N')}
                                            ${end.ativo ? '<span class="badge badge-ativo">Ativo</span>' : '<span class="badge badge-inativo">Inativo</span>'}
                                        </div>
                                        <div class="endereco-complemento">
                                            ${end.complemento ? escapeHtml(end.complemento) + ' - ' : ''}
                                            ${escapeHtml(end.bairro || '')} - ${escapeHtml(end.cidade)}/${escapeHtml(end.estado)}
                                            ${end.cep ? `- CEP: ${escapeHtml(end.cep)}` : ''}
                                            ${end.regiao ? `<span style="color: #0B193F; font-weight: 600;">[${escapeHtml(end.regiao)}]</span>` : ''}
                                        </div>
                                    </div>
                                    <div style="display: flex; gap: 8px;">
                                        <button class="btn-icon btn-editar" onclick="editarEndereco('${end.id}')" title="Editar">✏️</button>
                                        <button class="btn-icon btn-excluir" onclick="excluirEndereco('${end.id}')" title="Excluir">🗑️</button>
                                    </div>
                                </div>
                            `).join('')}
                            <button class="btn-add-endereco" onclick="abrirModalEndereco('${cliente.id}')">➕ Adicionar Endereço</button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function toggleDetalhes(clienteId) {
            const detalhes = document.getElementById(`detalhes-${clienteId}`);
            const item = document.querySelector(`[data-id="${clienteId}"]`);
            if (!detalhes || !item) {
                console.error('[CLIENTES] Elemento não encontrado para clienteId:', clienteId);
                return;
            }
            const btnExpand = item.querySelector('.btn-expand');
            detalhes.classList.toggle('active');
            if (btnExpand) {
                btnExpand.textContent = detalhes.classList.contains('active') ? '▲' : '▼';
                btnExpand.title = detalhes.classList.contains('active') ? 'Ocultar detalhes' : 'Ver detalhes';
            }
            console.log('[CLIENTES] Toggle detalhes cliente', clienteId, '- ativo:', detalhes.classList.contains('active'));
        }

        function abrirModalCliente(clienteId = null) {
            const modal = document.getElementById('modalCliente');
            const titulo = document.getElementById('modalClienteTitulo');
            const form = document.getElementById('formCliente');
            form.reset();
            document.getElementById('clienteId').value = '';
            if (clienteId) {
                const cliente = clientesData.find(c => c.id === clienteId);
                if (cliente) {
                    titulo.textContent = 'Editar Cliente';
                    document.getElementById('clienteId').value = cliente.id;
                    document.getElementById('nome').value = cliente.nome || '';
                    document.getElementById('cpf').value = cliente.cpf || '';
                    document.getElementById('whatsapp').value = cliente.whatsapp || '';
                    document.getElementById('instagram').value = cliente.instagram || '';
                    document.getElementById('email').value = cliente.email || '';
                }
            } else {
                titulo.textContent = 'Novo Cliente';
            }
            modal.classList.add('active');
        }

        function fecharModalCliente() {
            document.getElementById('modalCliente').classList.remove('active');
        }

        async function salvarCliente() {
            const id = document.getElementById('clienteId').value;
            const dados = {
                cliente_id: clienteSistemaId,
                nome: document.getElementById('nome').value.trim(),
                cpf: document.getElementById('cpf').value.trim() || null,
                whatsapp: document.getElementById('whatsapp').value.trim() || null,
                instagram: document.getElementById('instagram').value.trim() || null,
                email: document.getElementById('email').value.trim() || null
            };
            if (!dados.nome) {
                mostrarToast('Nome é obrigatório', 'error');
                return;
            }
            try {
                let result;
                if (id) {
                    result = await supabaseClient.from('clientes_pg').update(dados).eq('id', id).eq('cliente_id', clienteSistemaId).select();
                } else {
                    result = await supabaseClient.from('clientes_pg').insert([dados]).select();
                }
                if (result.error) {
                    if (result.error.code === '23505') {
                        mostrarToast('CPF já cadastrado', 'error');
                        return;
                    }
                    throw result.error;
                }
                mostrarToast(id ? 'Cliente atualizado com sucesso!' : 'Cliente cadastrado com sucesso!', 'success');
                fecharModalCliente();
                await buscarClientes();
                await carregarEstatisticas();
            } catch (error) {
                console.error('[CLIENTES] Erro ao salvar cliente:', error);
                mostrarToast('Erro ao salvar cliente', 'error');
            }
        }

        function editarCliente(id) {
            abrirModalCliente(id);
        }

        async function excluirCliente(id) {
            if (!confirm('Tem certeza que deseja excluir este cliente? Todos os endereços associados também serão excluídos.')) {
                return;
            }
            try {
                const { error } = await supabaseClient.from('clientes_pg').delete().eq('id', id).eq('cliente_id', clienteSistemaId);
                if (error) throw error;
                mostrarToast('Cliente excluído com sucesso!', 'success');
                await buscarClientes();
                await carregarEstatisticas();
            } catch (error) {
                console.error('[CLIENTES] Erro ao excluir cliente:', error);
                mostrarToast('Erro ao excluir cliente', 'error');
            }
        }

        function abrirModalEndereco(clienteId, enderecoId = null) {
            const modal = document.getElementById('modalEndereco');
            const titulo = document.getElementById('modalEnderecoTitulo');
            const form = document.getElementById('formEndereco');
            form.reset();
            document.getElementById('enderecoId').value = '';
            document.getElementById('enderecoClienteId').value = clienteId;
            if (enderecoId) {
                let endereco = null;
                clientesData.forEach(c => {
                    const end = c.enderecos_pg?.find(e => e.id === enderecoId);
                    if (end) endereco = end;
                });
                if (endereco) {
                    titulo.textContent = 'Editar Endereço';
                    document.getElementById('enderecoId').value = endereco.id;
                    document.getElementById('enderecoClienteId').value = endereco.cliente_id;
                    document.getElementById('cep').value = endereco.cep || '';
                    document.getElementById('rua').value = endereco.rua || '';
                    document.getElementById('numero').value = endereco.numero || '';
                    document.getElementById('complemento').value = endereco.complemento || '';
                    document.getElementById('bairro').value = endereco.bairro || '';
                    document.getElementById('cidade').value = endereco.cidade || '';
                    document.getElementById('estado').value = endereco.estado || 'SC';
                    document.getElementById('regiao').value = endereco.regiao || '';
                }
            } else {
                titulo.textContent = 'Novo Endereço';
            }
            modal.classList.add('active');
        }

        function fecharModalEndereco() {
            document.getElementById('modalEndereco').classList.remove('active');
        }

        async function salvarEndereco() {
            const id = document.getElementById('enderecoId').value;
            const clienteId = document.getElementById('enderecoClienteId').value;
            const dados = {
                cliente_id: clienteSistemaId,
                cliente_pg_id: clienteId,
                cep: document.getElementById('cep').value.trim(),
                rua: document.getElementById('rua').value.trim(),
                numero: document.getElementById('numero').value.trim() || null,
                complemento: document.getElementById('complemento').value.trim() || null,
                bairro: document.getElementById('bairro').value.trim() || null,
                cidade: document.getElementById('cidade').value.trim(),
                estado: document.getElementById('estado').value.trim() || 'SC',
                regiao: document.getElementById('regiao').value || null
            };
            if (!dados.cep || !dados.rua || !dados.cidade) {
                mostrarToast('CEP, Rua e Cidade são obrigatórios', 'error');
                return;
            }
            try {
                let result;
                if (id) {
                    result = await supabaseClient.from('enderecos_pg').update(dados).eq('id', id).eq('cliente_id', clienteSistemaId).select();
                } else {
                    result = await supabaseClient.from('enderecos_pg').insert([dados]).select();
                }
                if (result.error) throw result.error;
                mostrarToast(id ? 'Endereço atualizado com sucesso!' : 'Endereço cadastrado com sucesso!', 'success');
                fecharModalEndereco();
                await buscarClientes();
            } catch (error) {
                console.error('[CLIENTES] Erro ao salvar endereço:', error);
                mostrarToast('Erro ao salvar endereço', 'error');
            }
        }

        function editarEndereco(id) {
            const clienteId = document.getElementById(`detalhes-${getClienteIdByEndereco(id)}`)?.closest('.cliente-item')?.dataset.id;
            abrirModalEndereco(clienteId, id);
        }

        function getClienteIdByEndereco(enderecoId) {
            for (const cliente of clientesData) {
                if (cliente.enderecos_pg?.some(e => e.id === enderecoId)) {
                    return cliente.id;
                }
            }
            return null;
        }

        async function excluirEndereco(id) {
            if (!confirm('Tem certeza que deseja excluir este endereço?')) {
                return;
            }
            try {
                const { error } = await supabaseClient.from('enderecos_pg').delete().eq('id', id).eq('cliente_id', clienteSistemaId);
                if (error) throw error;
                mostrarToast('Endereço excluído com sucesso!', 'success');
                await buscarClientes();
            } catch (error) {
                console.error('[CLIENTES] Erro ao excluir endereço:', error);
                mostrarToast('Erro ao excluir endereço', 'error');
            }
        }

        function limparBusca() {
            document.getElementById('buscaNome').value = '';
            document.getElementById('buscaCidade').value = '';
            document.getElementById('buscaRegiao').value = '';
            buscarClientes();
        }

        function formatarCPF(cpf) {
            if (!cpf) return 'Não informado';
            const cpfLimpo = cpf.replace(/\D/g, '');
            if (cpfLimpo.length !== 11) return cpf;
            return cpfLimpo.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function mostrarToast(mensagem, tipo = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = mensagem;
            toast.className = `toast ${tipo} show`;
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        document.querySelectorAll('.modal-overlay').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('active');
                }
            });
        });

        document.getElementById('cpf').addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length <= 11) {
                value = value.replace(/(\d{3})(\d)/, '$1.$2');
                value = value.replace(/(\d{3})(\d)/, '$1.$2');
                value = value.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
            }
            e.target.value = value;
        });

        document.getElementById('cep').addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length <= 8) {
                value = value.replace(/(\d{5})(\d)/, '$1-$2');
            }
            e.target.value = value;
        });
    </script>
    <script src="navmenu.js"></script>
</body>
</html>
