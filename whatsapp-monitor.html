<script>
// ==========================================
// SESSION.JS - Sistema de Sessao Unificado
// Verifica login em TODAS as paginas protegidas
// v1.0 - Sessao unica via localStorage + Supabase
// ==========================================

(function() {
    'use strict';

    // ===== CONFIG =====
    const SUPABASE_URL = 'https://aqrvozmxlcgrllclceke.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFxcnZvem14bGNncmxsY2xjZWtlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNTk0MDEsImV4cCI6MjA5MTgzNTQwMX0.6CL3-1dU6WUT4EbJ0UfvmLFj6jGPnT9Avc743WrNiCA';
    const LOGIN_PAGE = 'login.html';
    const SESSAO_KEY = 'usuarioLogado';

    // ===== DETECTAR SE ESTAMOS EM UMA PAGINA PUBLICA =====
    const path = window.location.pathname.toLowerCase();
    const href = window.location.href.toLowerCase();
    const paginasPublicas = [
        'login.html',
        'solicitacao-entrega.html',
        'solicitacoes.html',
        'solicitacoes1.html',
        'coblive.html',
        'pix-pagamento.html',
        'pix-sucesso.html',
        'links.html',
        'index.html',
        'index2.html'
    ];

    function ehPaginaPublica() {
        // Se esta na raiz (index)
        if (path === '/' || path.endsWith('/index.html') || path.endsWith('/index2.html')) return true;
        // Verifica lista de paginas publicas
        for (const pagina of paginasPublicas) {
            if (path.includes(pagina) || href.includes(pagina)) return true;
        }
        return false;
    }

    // ===== VERIFICACAO SINCRONA IMEDIATA =====
    // Esta e a parte mais importante - executa ANTES de qualquer coisa
    function verificarSessaoSincrona() {
        // Nao verifica em paginas publicas
        if (ehPaginaPublica()) {
            console.log('[SESSION] Pagina publica detectada - sem verificacao');
            return true;
        }

        try {
            const sessaoRaw = localStorage.getItem(SESSAO_KEY);
            if (!sessaoRaw) {
                console.log('[SESSION] Sem sessao - redirecionando para login');
                redirecionarParaLogin();
                return false;
            }

            const sessao = JSON.parse(sessaoRaw);
            if (!sessao || !sessao.auth_id || !sessao.usuario_id) {
                console.log('[SESSION] Sessao invalida - redirecionando');
                limparSessao();
                redirecionarParaLogin();
                return false;
            }

            // Verificar se a sessao nao expirou (24 horas)
            if (sessao.login_time) {
                const loginTime = new Date(sessao.login_time).getTime();
                const agora = Date.now();
                const vinteQuatroHoras = 24 * 60 * 60 * 1000;
                if ((agora - loginTime) > vinteQuatroHoras) {
                    console.log('[SESSION] Sessao expirada (24h)');
                    limparSessao();
                    redirecionarParaLogin();
                    return false;
                }
            }

            // Sessao valida!
            console.log('[SESSION] Sessao valida:', sessao.nome || sessao.email);
            window.sessaoUsuario = sessao;
            window.authClienteId = sessao.cliente_id;
            return true;
        } catch (e) {
            console.error('[SESSION] Erro ao verificar sessao:', e);
            limparSessao();
            redirecionarParaLogin();
            return false;
        }
    }

    function redirecionarParaLogin() {
        // Evitar loop de redirecionamento
        if (window.location.href.includes(LOGIN_PAGE)) return;
        localStorage.setItem('logoutTimestamp', Date.now());
            window.location.href = LOGIN_PAGE + '?logout=1';
    }

    function limparSessao() {
        localStorage.removeItem(SESSAO_KEY);
        localStorage.removeItem('clienteId');
        localStorage.removeItem('nivelAcesso');
        sessionStorage.clear();
    }

    // ===== INICIALIZACAO DO SUPABASE =====
    let supabaseInicializado = false;
    let supabaseInitPromise = null;

    function detectarSupabase() {
        const possiveis = [
            typeof supabase !== 'undefined' ? supabase : null,
            typeof window !== 'undefined' && window.supabase ? window.supabase : null,
            typeof window !== 'undefined' && window.supabaseClient ? window.supabaseClient : null
        ];
        for (const lib of possiveis) {
            if (lib && lib.createClient) return lib;
        }
        return null;
    }

    async function inicializarSupabase() {
        if (supabaseInicializado && window.supabaseClient) return true;
        if (supabaseInitPromise) return supabaseInitPromise;

        supabaseInitPromise = (async () => {
            try {
                // Verificar se ja existe um client Supabase
                if (window.supabaseClient) {
                    supabaseInicializado = true;
                    return true;
                }

                // Tentar detectar a biblioteca Supabase
                let supabaseLib = detectarSupabase();

                // Se nao encontrou, tentar carregar do CDN
                if (!supabaseLib) {
                    console.log('[SESSION] Carregando Supabase do CDN...');
                    await carregarScript('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js');
                    supabaseLib = detectarSupabase();
                }

                if (!supabaseLib) {
                    console.error('[SESSION] Nao foi possivel carregar Supabase');
                    return false;
                }

                window.supabaseClient = supabaseLib.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
                    auth: {
                        autoRefreshToken: true,
                        persistSession: true,
                        detectSessionInUrl: false
                    }
                });

                // Sincronizar com a sessao do Supabase Auth
                try {
                    const { data: { session } } = await window.supabaseClient.auth.getSession();
                    if (!session) {
                        // Supabase nao tem sessao, mas localStorage tem - tentar restaurar
                        console.log('[SESSION] Supabase sem sessao, mas localStorage tem');
                    }
                } catch (e) {
                    // Ignorar erro
                }

                supabaseInicializado = true;
                console.log('[SESSION] Supabase inicializado');
                return true;
            } catch (err) {
                console.error('[SESSION] Erro ao inicializar Supabase:', err);
                return false;
            }
        })();

        return supabaseInitPromise;
    }

    function carregarScript(src) {
        return new Promise((resolve, reject) => {
            // Verificar se o script ja existe
            const existente = document.querySelector(`script[src*="supabase"]`);
            if (existente) {
                // Aguardar carregamento
                if (detectarSupabase()) {
                    resolve();
                    return;
                }
                existente.addEventListener('load', () => resolve());
                existente.addEventListener('error', () => reject());
                return;
            }

            const script = document.createElement('script');
            script.src = src;
            script.crossOrigin = 'anonymous';
            script.onload = () => resolve();
            script.onerror = () => reject(new Error('Falha ao carregar: ' + src));
            document.head.appendChild(script);
        });
    }

    // ===== API PUBLICA =====
    const sessaoAPI = {
        // Dados do usuario logado
        get usuario() { return window.sessaoUsuario || null; },
        get clienteId() { return window.sessaoUsuario?.cliente_id || null; },
        get usuarioId() { return window.sessaoUsuario?.usuario_id || null; },
        get nome() { return window.sessaoUsuario?.nome || ''; },
        get email() { return window.sessaoUsuario?.email || ''; },
        get nivelAcesso() { return window.sessaoUsuario?.nivel_acesso || ''; },
        get authId() { return window.sessaoUsuario?.auth_id || null; },

        // Verificar se esta autenticado
        estaAutenticado() {
            return !!window.sessaoUsuario && !!window.sessaoUsuario.auth_id;
        },

        // Obter cliente Supabase (inicializa se necessario)
        async getSupabase() {
            await inicializarSupabase();
            return window.supabaseClient;
        },

        // Verificar se Supabase esta pronto
        get supabasePronto() { return supabaseInicializado; },

        // Logout unificado
        async logout() {
            console.log('[SESSION] Realizando logout...');
            try {
                if (window.supabaseClient) {
                    await window.supabaseClient.auth.signOut();
                }
            } catch (e) {
                // Ignorar erro no signOut
            }
            limparSessao();
            window.sessaoUsuario = null;
            window.authClienteId = null;
            window.authUsuario = null;
            localStorage.setItem('logoutTimestamp', Date.now());
            window.location.href = LOGIN_PAGE + '?logout=1';
        },

        // Atualizar dados da sessao
        atualizar(dados) {
            const atual = window.sessaoUsuario || {};
            const novo = { ...atual, ...dados, login_time: new Date().toISOString() };
            window.sessaoUsuario = novo;
            localStorage.setItem(SESSAO_KEY, JSON.stringify(novo));
        },

        // Verificar permissao (admin, etc)
        temPermissao(nivel) {
            return (window.sessaoUsuario?.nivel_acesso || '').toLowerCase() === nivel.toLowerCase();
        },

        // Recarregar dados do usuario do banco
        async recarregar() {
            const sb = await inicializarSupabase();
            if (!sb) return false;

            try {
                const { data: { session } } = await window.supabaseClient.auth.getSession();
                if (!session) {
                    this.logout();
                    return false;
                }

                const { data: usuario } = await window.supabaseClient
                    .from('usuarios_pg')
                    .select('*, clientes_sistema(nome, ativo, data_expiracao)')
                    .eq('auth_id', session.user.id)
                    .eq('ativo', true)
                    .single();

                if (!usuario) {
                    this.logout();
                    return false;
                }

                this.atualizar({
                    usuario_id: usuario.id,
                    nome: usuario.nome,
                    email: usuario.email,
                    cliente_id: usuario.cliente_id,
                    nivel_acesso: usuario.nivel_acesso
                });

                return true;
            } catch (e) {
                console.error('[SESSION] Erro ao recarregar:', e);
                return false;
            }
        }
    };

    // Expor globalmente
    window.sessao = sessaoAPI;
    window.sessionGuard = {
        verificar: verificarSessaoSincrona,
        inicializarSupabase: inicializarSupabase
    };

    // ===== INICIALIZACAO =====
    // 1. Verificacao sincrona IMEDIATA (antes de tudo)
    const sessaoValida = verificarSessaoSincrona();

    // 2. Se sessao valida, inicializar Supabase quando DOM estiver pronto
    if (sessaoValida && !ehPaginaPublica()) {
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                inicializarSupabase();
            });
        } else {
            // DOM ja carregou, inicializar agora
            inicializarSupabase();
        }

        // Tambem inicializar imediatamente se Supabase ja estiver disponivel
        if (detectarSupabase()) {
            inicializarSupabase();
        }
    }

    console.log('[SESSION] session.js carregado - Sessao unificada ativa');
})();
</script>

            { url: 'whatsapp-monitor.html', icon: '📱', label: 'Monitor WhatsApp' }
        ];

        window.navGetCurrentPage = function() {
            var path = window.location.pathname;
            return path.substring(path.lastIndexOf('/') + 1) || 'dashboard.html';
        };
        window.navIsCurrent = function(url) {
            var current = window.navGetCurrentPage();
            return current === url || current.indexOf(url + '?') === 0;
        };
        window.navEscapeHtml = function(text) {
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        };
        window.openMenu = function() {
            var overlay = document.getElementById('navMenuOverlay');
            var panel = document.getElementById('navMenuPanel');
            if (overlay && panel) {
                overlay.classList.add('active');
                panel.classList.add('active');
                document.body.classList.add('nav-menu-open');
            }
        };
        window.closeMenu = function() {
            var overlay = document.getElementById('navMenuOverlay');
            var panel = document.getElementById('navMenuPanel');
            if (overlay && panel) {
                overlay.classList.remove('active');
                panel.classList.remove('active');
                document.body.classList.remove('nav-menu-open');
            }
        };
        window.navGoTo = function(url) {
            window.closeMenu();
            setTimeout(function() { window.location.href = url; }, 280);
        };
        window.navDoLogout = function() {
            window.closeMenu();
            setTimeout(function() {
                if (typeof window.fazerLogout === 'function') {
                    window.fazerLogout();
                } else {
                    window.location.href = 'login.html';
                }
            }, 280);
        };
        window.renderMenuLinks = function() {
            var linksContainer = document.getElementById('navMenuLinks');
            if (!linksContainer) return;
            linksContainer.innerHTML = '';
            var items = window.NAV_MENU_ITEMS;
            for (var i = 0; i < items.length; i++) {
                var item = items[i];
                var active = window.navIsCurrent(item.url) ? ' active' : '';
                var badge = item.badgeId ? '<span class="nav-menu-badge" id="' + item.badgeId + '" style="display:none;">0</span>' : '';
                var a = document.createElement('a');
                a.href = item.url;
                a.className = 'nav-menu-item' + active;
                a.innerHTML = '<span class="nav-icon">' + item.icon + '</span><span class="nav-label">' + window.navEscapeHtml(item.label) + '</span>' + badge;
                if (active) {
                    a.onclick = function(e) { e.preventDefault(); window.closeMenu(); };
                } else {
                    (function(url) {
                        a.onclick = function(e) { e.preventDefault(); window.navGoTo(url); };
                    })(item.url);
                }
                linksContainer.appendChild(a);
            }
        };
    })();
    </script>

        // Constantes
        const EVOLUTION_API_URL = 'https://evolution-api-o12a.onrender.com';

        let supabaseClient = null;

        document.addEventListener('DOMContentLoaded', async function() {
            await new Promise(resolve => {

            supabaseClient = window.supabaseClient;

            const hoje = new Date();

            document.getElementById('filtroDataFim').value = hoje.toISOString().split('T')[0];
            document.getElementById('filtroDataInicio').value = seteDiasAtras.toISOString().split('T')[0];

            console.log('[MONITOR] Inicializando monitor. Cliente ID:', clienteSistemaId);
            console.log('[MONITOR] Data início:', document.getElementById('filtroDataInicio').value);

        async function carregarEnvios() {
            const tbody = document.getElementById('tbodyEnvios');
            tbody.innerHTML = '<tr><td colspan="9" class="loading">Carregando envios...</td></tr>';
            try {
                console.log('[MONITOR] Carregando envios para cliente:', clienteSistemaId);
                console.log('[MONITOR] Query cliente_sistema_id:', clienteSistemaId, 'tipo:', typeof clienteSistemaId);
                let query = supabaseClient
                    .from('whatsapp_envios')
                    .select('*')
                    .eq('cliente_sistema_id', clienteSistemaId)
                    .order('criado_em', { ascending: false });
                const dataInicio = document.getElementById('filtroDataInicio').value;
                const dataFim = document.getElementById('filtroDataFim').value;
                const tipo = document.getElementById('filtroTipo').value;
                const status = document.getElementById('filtroStatus').value;
                const origem = document.getElementById('filtroOrigem').value;
                const busca = document.getElementById('filtroBusca').value.trim().toLowerCase();
                if (dataInicio) query = query.gte('criado_em', dataInicio + 'T00:00:00');
                if (dataFim) query = query.lte('criado_em', dataFim + 'T23:59:59');
                if (tipo) query = query.eq('tipo_envio', tipo);
                if (status) query = query.eq('status_envio', status);
                if (origem) query = query.eq('origem', origem);
                const { data, error } = await query.limit(200);
                if (error) throw error;
                console.log('[MONITOR] Registros retornados:', data ? data.length : 0);
                if (data && data.length > 0) {
                    console.log('[MONITOR] Primeiro registro:', data[0]);
                }
                enviosData = data || [];
                if (busca) {
                    enviosData = enviosData.filter(e => {
                        const nome = (e.nome_destino || e.destinatario || '').toLowerCase();
                        const numero = (e.numero_destino || e.numero || '').toLowerCase();
                        return nome.includes(busca) || numero.includes(busca);
                    });
                }
                renderizarTabela();
                atualizarEstatisticas();
            } catch (e) {
                console.error('[MONITOR] Erro ao carregar envios:', e);
                tbody.innerHTML = '<tr><td colspan="9" class="empty-state">Erro: ' + (e.message || 'Erro desconhecido') + '</td></tr>';
            }
        }

        function renderizarTabela() {
            const tbody = document.getElementById('tbodyEnvios');
            console.log('[MONITOR] Renderizando', enviosData.length, 'registros');
            if (enviosData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" class="empty-state"><div style="font-size: 48px; margin-bottom: 15px;">📭</div><p>Nenhum envio encontrado</p></td></tr>';
                return;
            }
            var html = '';
            for (var i = 0; i < enviosData.length; i++) {
                try {
                    var envio = enviosData[i];
                    var data = new Date(envio.criado_em).toLocaleString('pt-BR');
                    var tipo = envio.tipo_envio || envio.tipo || '-';
                    var status = envio.status_envio || envio.status || '-';
                    var origem = envio.origem || '-';
                    var numero = envio.numero_destino || envio.numero || '-';
                    var nome = envio.nome_destino || envio.destinatario || '-';
                    var mensagem = envio.mensagem || '-';
                    var valor = envio.valor ? 'R$ ' + parseFloat(envio.valor).toFixed(2).replace('.', ',') : '-';
                    var statusClass = 'status-' + status;
                    var origemClass = 'origem-' + origem;
                    var tipoLabel = tipo === 'pix_cobranca' ? '💳 PIX' : (tipo === 'rastreamento' ? '📦 Rastreio' : (tipo === 'confirmacao_solicitacao' ? '✅ Conf. Solicitação' : (tipo === 'confirmacao_pagamento' ? '💰 Conf. Pagamento' : tipo)));
                    var origemLabel = origem === 'coblive' ? '💰 COBRANÇA LIVE' : (origem === 'rastreamento' ? '🚚 RASTREAMENTO' : (origem === 'solicitacao-entrega' ? '📦 SOLICITAÇÃO ENTREGA' : origem));

                    var btnReenviar = '';
                    if (status === 'timeout') {
                        var safeMsg = mensagem.replace(/"/g, '&quot;').replace(/'/g, "&#39;");
                        btnReenviar = '<button class="btn-reenviar" id="btn-reenviar-' + envio.id + '" data-log-id="' + envio.id + '" data-numero="' + numero + '" data-mensagem="' + safeMsg + '" data-tipo="' + tipo + '">🔄 Reenviar</button>';
                    }

                    html += '<tr>' +
                        '<td>' + data + '</td>' +
                        '<td><span class="origem-badge ' + origemClass + '">' + origemLabel + '</span></td>' +
                        '<td>' + tipoLabel + '</td>' +
                        '<td><span class="status-badge ' + statusClass + '">' + status + '</span></td>' +
                        '<td>' + numero + '</td>' +
                        '<td><strong>' + nome + '</strong></td>' +
                        '<td style="max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" title="' + mensagem + '">' + mensagem + '</td>' +
                        '<td><strong>' + valor + '</strong></td>' +
                        '<td>' + btnReenviar + '</td>' +
                    '</tr>';
                } catch (err) {
                    console.error('[MONITOR] Erro ao renderizar linha', i, ':', err);
                }
            }
            tbody.innerHTML = html;
            setupReenviarListeners();
        }

        function atualizarEstatisticas() {
            const total = enviosData.length;
            const enviados = enviosData.filter(e => (e.status_envio || e.status) === 'enviado').length;
            const timeouts = enviosData.filter(e => (e.status_envio || e.status) === 'timeout').length;
            const falhas = enviosData.filter(e => ['falha', 'numero_invalido'].includes(e.status_envio || e.status)).length;
            const reenviados = enviosData.filter(e => (e.status_envio || e.status) === 'reenviado').length;
            document.getElementById('statTotal').textContent = total;
            document.getElementById('statEnviados').textContent = enviados;
            document.getElementById('statTimeouts').textContent = timeouts;
            document.getElementById('statFalhas').textContent = falhas;
            document.getElementById('statReenviados').textContent = reenviados;
        }

        function iniciarRealtime() {
            canalRealtime = supabaseClient
                .channel('whatsapp_envios_changes')
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'whatsapp_envios',
                    filter: 'cliente_sistema_id=eq.' + clienteSistemaId
                }, (payload) => {
                    enviosData.unshift(payload.new);
                    renderizarTabela();
                    atualizarEstatisticas();
                    showToast('📱 Novo envio detectado!', 'info');
                })
                .on('postgres_changes', {
                    event: 'UPDATE',
                    schema: 'public',
                    table: 'whatsapp_envios',
                    filter: 'cliente_sistema_id=eq.' + clienteSistemaId
                }, (payload) => {
                    const idx = enviosData.findIndex(e => e.id === payload.new.id);
                    if (idx >= 0) {
                        enviosData[idx] = payload.new;
                        renderizarTabela();
                        atualizarEstatisticas();
                    }
                })
                .subscribe((status) => {
                    const indicator = document.getElementById('realtimeIndicator');
                    if (status === 'SUBSCRIBED') {
                        indicator.innerHTML = '<span class="realtime-dot"></span> Tempo real ativo';
                        indicator.style.background = '#E8F5E9';
                        indicator.style.color = '#2E7D32';
                    } else {
                        indicator.innerHTML = '⚠️ Reconectando...';
                        indicator.style.background = '#FFF3E0';
                        indicator.style.color = '#E65100';
                    }
                });
        }

        async function clickReenviar(btn) {
            const logId = btn.getAttribute('data-log-id');
            const numero = btn.getAttribute('data-numero');
            const mensagem = btn.getAttribute('data-mensagem');
            const tipo = btn.getAttribute('data-tipo');

            if (!btn || btn.disabled) return;
            btn.disabled = true;
            btn.classList.add('reenviando');
            btn.innerHTML = '⏳ Reenviando...';
            try {
                const resultado = await reenviarWhatsApp(numero, mensagem);
                if (resultado.sucesso) {
                    await supabaseClient.from('whatsapp_envios').update({ status_envio: 'reenviado', atualizado_em: new Date().toISOString() }).eq('id', logId);
                    btn.classList.remove('reenviando');
                    btn.classList.add('sucesso');
                    btn.innerHTML = '✅ Reenviado';
                    showToast('✅ Mensagem reenviada com sucesso!', 'sucesso');
                    setTimeout(() => carregarEnvios(), 1500);
                } else {
                    btn.disabled = false;
                    btn.classList.remove('reenviando');
                    btn.innerHTML = '🔄 Reenviar';
                    showToast('❌ ' + resultado.mensagem, 'erro');
                }
            } catch (e) {
                btn.disabled = false;
                btn.classList.remove('reenviando');
                btn.innerHTML = '🔄 Reenviar';
                showToast('❌ Erro: ' + e.message, 'erro');
            }
        }

        // Event delegation para botões de reenvio
        function setupReenviarListeners() {
            const tbody = document.getElementById('tbodyEnvios');
            if (!tbody) return;
            tbody.addEventListener('click', function(e) {
                const btn = e.target.closest('.btn-reenviar');
                if (btn) {
                    e.preventDefault();
                    clickReenviar(btn);
                }
            });
        }
async function reenviarWhatsApp(numero, mensagem) {
            let numeroLimpo = numero.replace(/\D/g, '');
            if (!numeroLimpo.startsWith('55')) numeroLimpo = '55' + numeroLimpo;
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), TIMEOUT_EVOLUTION);
                const response = await fetch(EVOLUTION_API_URL + '/message/sendText/' + EVOLUTION_INSTANCE, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'apikey': EVOLUTION_API_KEY },
                    body: JSON.stringify({ number: numeroLimpo, text: mensagem }),
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                const data = await response.json();
                if (!response.ok) {
                    return { sucesso: false, erro: data.error || 'HTTP ' + response.status, mensagem: 'Erro ao reenviar' };
                }
                return { sucesso: true, mensagem: 'Mensagem reenviada!' };
            } catch (erro) {
                if (erro.name === 'AbortError') {
                    return { sucesso: false, erro: 'Timeout', mensagem: 'Timeout novamente. Tente mais tarde.' };
                }
                return { sucesso: false, erro: erro.message, mensagem: 'Erro: ' + erro.message };
            }
        }

        async function carregarTodosSemFiltroData() {
            console.log('[MONITOR] Carregando TODOS os registros sem filtro de data...');
            const tbody = document.getElementById('tbodyEnvios');
            tbody.innerHTML = '<tr><td colspan="9" class="loading">Carregando todos os envios...</td></tr>';
            try {
                let query = supabaseClient
                    .from('whatsapp_envios')
                    .select('*')
                    .eq('cliente_sistema_id', clienteSistemaId)
                    .order('criado_em', { ascending: false });

                const { data, error } = await query.limit(500);
                if (error) throw error;
                console.log('[MONITOR] Todos os registros (sem filtro data):', data ? data.length : 0);
                if (data && data.length > 0) {
                    console.log('[MONITOR] Primeiro registro:', data[0]);
                    console.log('[MONITOR] Último registro:', data[data.length - 1]);
                }
                enviosData = data || [];
                renderizarTabela();
                atualizarEstatisticas();
                showToast('📋 Mostrando ' + enviosData.length + ' registros (sem filtro de data)', 'sucesso');
            } catch (e) {
                console.error('[MONITOR] Erro ao carregar todos:', e);
                tbody.innerHTML = '<tr><td colspan="9" class="empty-state">Erro: ' + (e.message || 'Erro desconhecido') + '</td></tr>';
            }
        }

        function aplicarFiltros() { carregarEnvios(); }
        function limparFiltros() {
            document.getElementById('filtroDataInicio').value = '';
            document.getElementById('filtroDataFim').value = '';
            document.getElementById('filtroTipo').value = '';
            document.getElementById('filtroStatus').value = '';
            document.getElementById('filtroOrigem').value = '';
            document.getElementById('filtroBusca').value = '';
            carregarEnvios();
        }

        function showToast(mensagem, tipo) {
            const anterior = document.querySelector('.toast-reenvio');
            if (anterior) anterior.remove();
            const toast = document.createElement('div');
            toast.className = 'toast-reenvio ' + tipo;
            toast.textContent = mensagem;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'slideUp 0.3s ease reverse';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }
    </script>
</body>
