<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerar Link PIX - Pingo de Gente</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2.39.8"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0B193F;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #0B193F;
            text-align: center;
            margin-bottom: 10px;
        }
        .subtitulo {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
        }
        .filtros {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .filtros input, .filtros select {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
        }
        .btn-buscar {
            background: #0B193F;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
        }
        .vendas-lista {
            margin-top: 20px;
        }
        .venda-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }
        .venda-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .venda-info h3 {
            color: #333;
            margin-bottom: 5px;
        }
        .venda-info p {
            color: #666;
            font-size: 0.9rem;
            margin: 3px 0;
        }
        .venda-valor {
            font-size: 1.5rem;
            color: #0B193F;
            font-weight: bold;
        }
        .btn-gerar {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
        }
        .btn-gerar:hover {
            background: #218838;
        }
        .btn-copiado {
            background: #ffc107;
            color: #333;
        }
        .link-gerado {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            border-radius: 8px;
            padding: 15px;
            margin-top: 10px;
            display: none;
        }
        .link-gerado.ativo {
            display: block;
        }
        .link-gerado input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.85rem;
        }
        .sem-vendas {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        .loading {
            text-align: center;
            padding: 40px;
        }
        .loading::after {
            content: '';
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0B193F;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔗 Gerar Link de Pagamento PIX</h1>
        <p class="subtitulo">Selecione uma venda para gerar o link de pagamento</p>

        <div class="filtros">
            <input type="text" id="filtro-live" placeholder="Código da Live (ex: LIVE-015)">
            <input type="text" id="filtro-cliente" placeholder="Nome do cliente">
            <input type="date" id="filtro-data">
            <select id="filtro-status">
                <option value="pendente">Pendente</option>
                <option value="todos">Todos</option>
            </select>
            <button class="btn-buscar" onclick="buscarVendas()">🔍 Buscar</button>
        </div>

        <div id="loading" class="loading" style="display:none;">
            <p>Carregando vendas...</p>
        </div>

        <div id="vendas-lista" class="vendas-lista">
            <div class="sem-vendas">Clique em "Buscar" para carregar as vendas</div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://aqrvozmxlcgrllclceke.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFxcnZvem14bGNncmxsY2xjZWtlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNTk0MDEsImV4cCI6MjA5MTgzNTQwMX0.6CL3-1dU6WUT4EbJ0UfvmLFj6jGPnT9Avc743WrNiCA';

        let supabaseClient = null;
        let usuarioLogado = null;

        document.addEventListener('DOMContentLoaded', async () => {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            // Verificar autenticação
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                window.location.href = 'login.html';
                return;
            }
            usuarioLogado = session.user;
        });

        async function buscarVendas() {
            const lista = document.getElementById('vendas-lista');
            const loading = document.getElementById('loading');
            
            lista.innerHTML = '';
            loading.style.display = 'block';

            try {
                const live = document.getElementById('filtro-live').value;
                const cliente = document.getElementById('filtro-cliente').value;
                const data = document.getElementById('filtro-data').value;
                const status = document.getElementById('filtro-status').value;

                let query = supabaseClient
                    .from('vendas_pg')
                    .select('*, clientes_pg(nome, instagram)')
                    .eq('cliente_sistema_id', usuarioLogado.user_metadata?.cliente_sistema_id)
                    .order('criado_em', { ascending: false });

                if (status === 'pendente') {
                    query = query.in('status', ['pendente', 'aberto', 'nao_pago']);
                }

                if (live) {
                    query = query.ilike('codigo_live', `%${live}%`);
                }

                if (cliente) {
                    query = query.ilike('comprador_nome', `%${cliente}%`);
                }

                if (data) {
                    query = query.eq('data_venda', data);
                }

                const { data: vendas, error } = await query.limit(50);

                loading.style.display = 'none';

                if (error) {
                    lista.innerHTML = `<div class="sem-vendas">Erro: ${error.message}</div>`;
                    return;
                }

                if (!vendas || vendas.length === 0) {
                    lista.innerHTML = `<div class="sem-vendas">Nenhuma venda encontrada</div>`;
                    return;
                }

                lista.innerHTML = vendas.map(v => `
                    <div class="venda-card">
                        <div class="venda-info">
                            <h3>${v.clientes_pg?.nome || v.comprador_nome || 'Cliente'}</h3>
                            <p>📺 ${v.codigo_live || '-'} | 📅 ${formatarData(v.data_venda)}</p>
                            <p>📦 ${v.itens?.length || 0} item(s)</p>
                        </div>
                        <div style="text-align:right;">
                            <div class="venda-valor">R$ ${parseFloat(v.valor_total).toFixed(2).replace('.', ',')}</div>
                            <button class="btn-gerar" onclick="gerarLink('${v.id}', this)">
                                🔗 Gerar Link
                            </button>
                            <div class="link-gerado" id="link-${v.id}">
                                <p><strong>Link copiado!</strong></p>
                                <input type="text" readonly value="" id="input-link-${v.id}" onclick="this.select()">
                                <p style="font-size:0.8rem;color:#666;margin-top:5px;">
                                    Envie este link para o cliente pagar via PIX
                                </p>
                            </div>
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                loading.style.display = 'none';
                lista.innerHTML = `<div class="sem-vendas">Erro: ${error.message}</div>`;
            }
        }

        async function gerarLink(vendaId, btn) {
            btn.disabled = true;
            btn.textContent = '⏳ Gerando...';

            try {
                // Verificar se já existe link
                const { data: existente } = await supabaseClient
                    .from('pix_estaticos')
                    .select('id')
                    .eq('venda_id', vendaId)
                    .maybeSingle();

                let pixId = existente?.id;

                if (!existente) {
                    // Criar registro do PIX
                    const { data: novo, error } = await supabaseClient
                        .from('pix_estaticos')
                        .insert({
                            venda_id: vendaId,
                            cliente_sistema_id: usuarioLogado.user_metadata?.cliente_sistema_id,
                            status: 'pendente',
                            chave_pix: 'eae138a5-64fc-428e-99d2-62b621971892'
                        })
                        .select()
                        .single();

                    if (error) throw error;
                    pixId = novo.id;
                }

                // Gerar URL
                const baseUrl = 'https://lojaebrechopingodegente.github.io/LiveControl';
                const link = `${baseUrl}/pix-pagamento.html?pix=${pixId}`;

                // Mostrar link
                const divLink = document.getElementById(`link-${vendaId}`);
                const inputLink = document.getElementById(`input-link-${vendaId}`);
                inputLink.value = link;
                divLink.classList.add('ativo');

                // Copiar para clipboard
                await navigator.clipboard.writeText(link);

                btn.textContent = '✅ Copiado!';
                btn.classList.add('btn-copiado');

                setTimeout(() => {
                    btn.disabled = false;
                    btn.textContent = '🔗 Gerar Link';
                    btn.classList.remove('btn-copiado');
                }, 3000);

            } catch (error) {
                console.error('Erro:', error);
                btn.disabled = false;
                btn.textContent = '❌ Erro';
            }
        }

        function formatarData(data) {
            if (!data) return '-';
            return new Date(data).toLocaleDateString('pt-BR');
        }
    </script>
</body>
</html>
