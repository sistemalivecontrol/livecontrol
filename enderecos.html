<script>
// ==========================================
// SESSION.JS - Sistema de Sessao Unificado
// Verifica login em TODAS as paginas protegidas
// v1.0 - Sessao unica via localStorage + Supabase
// ==========================================

(function() {
    'use strict';

    // ===== CONFIG =====
    const SUPABASE_URL = 'https://aqrvozmxlcgrllclceke.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFxcnZvem14bGNncmxsY2xjZWtlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNTk0MDEsImV4cCI6MjA5MTgzNTQwMX0.6CL3-1dU6WUT4EbJ0UfvmLFj6jGPnT9Avc743WrNiCA';
    const LOGIN_PAGE = 'login.html';
    const SESSAO_KEY = 'usuarioLogado';

    // ===== DETECTAR SE ESTAMOS EM UMA PAGINA PUBLICA =====
    const path = window.location.pathname.toLowerCase();
    const href = window.location.href.toLowerCase();
    const paginasPublicas = [
        'login.html',
        'solicitacao-entrega.html',
        'solicitacoes.html',
        'solicitacoes1.html',
        'coblive.html',
        'pix-pagamento.html',
        'pix-sucesso.html',
        'links.html',
        'index.html',
        'index2.html'
    ];

    function ehPaginaPublica() {
        // Se esta na raiz (index)
        if (path === '/' || path.endsWith('/index.html') || path.endsWith('/index2.html')) return true;
        // Verifica lista de paginas publicas
        for (const pagina of paginasPublicas) {
            if (path.includes(pagina) || href.includes(pagina)) return true;
        }
        return false;
    }

    // ===== VERIFICACAO SINCRONA IMEDIATA =====
    // Esta e a parte mais importante - executa ANTES de qualquer coisa
    function verificarSessaoSincrona() {
        // Nao verifica em paginas publicas
        if (ehPaginaPublica()) {
            console.log('[SESSION] Pagina publica detectada - sem verificacao');
            return true;
        }

        try {
            const sessaoRaw = localStorage.getItem(SESSAO_KEY);
            if (!sessaoRaw) {
                console.log('[SESSION] Sem sessao - redirecionando para login');
                redirecionarParaLogin();
                return false;
            }

            const sessao = JSON.parse(sessaoRaw);
            if (!sessao || !sessao.auth_id || !sessao.usuario_id) {
                console.log('[SESSION] Sessao invalida - redirecionando');
                limparSessao();
                redirecionarParaLogin();
                return false;
            }

            // Verificar se a sessao nao expirou (24 horas)
            if (sessao.login_time) {
                const loginTime = new Date(sessao.login_time).getTime();
                const agora = Date.now();
                const vinteQuatroHoras = 24 * 60 * 60 * 1000;
                if ((agora - loginTime) > vinteQuatroHoras) {
                    console.log('[SESSION] Sessao expirada (24h)');
                    limparSessao();
                    redirecionarParaLogin();
                    return false;
                }
            }

            // Sessao valida!
            console.log('[SESSION] Sessao valida:', sessao.nome || sessao.email);
            window.sessaoUsuario = sessao;
            window.authClienteId = sessao.cliente_id;
            return true;
        } catch (e) {
            console.error('[SESSION] Erro ao verificar sessao:', e);
            limparSessao();
            redirecionarParaLogin();
            return false;
        }
    }

    function redirecionarParaLogin() {
        // Evitar loop de redirecionamento
        if (window.location.href.includes(LOGIN_PAGE)) return;
        localStorage.setItem('logoutTimestamp', Date.now());
            window.location.href = LOGIN_PAGE + '?logout=1';
    }

    function limparSessao() {
        localStorage.removeItem(SESSAO_KEY);
        localStorage.removeItem('clienteId');
        localStorage.removeItem('nivelAcesso');
        sessionStorage.clear();
    }

    // ===== INICIALIZACAO DO SUPABASE =====
    let supabaseInicializado = false;
    let supabaseInitPromise = null;

    function detectarSupabase() {
        const possiveis = [
            typeof supabase !== 'undefined' ? supabase : null,
            typeof window !== 'undefined' && window.supabase ? window.supabase : null,
            typeof window !== 'undefined' && window.supabaseClient ? window.supabaseClient : null
        ];
        for (const lib of possiveis) {
            if (lib && lib.createClient) return lib;
        }
        return null;
    }

    async function inicializarSupabase() {
        if (supabaseInicializado && window.supabaseClient) return true;
        if (supabaseInitPromise) return supabaseInitPromise;

        supabaseInitPromise = (async () => {
            try {
                // Verificar se ja existe um client Supabase
                if (window.supabaseClient) {
                    supabaseInicializado = true;
                    return true;
                }

                // Tentar detectar a biblioteca Supabase
                let supabaseLib = detectarSupabase();

                // Se nao encontrou, tentar carregar do CDN
                if (!supabaseLib) {
                    console.log('[SESSION] Carregando Supabase do CDN...');
                    await carregarScript('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js');
                    supabaseLib = detectarSupabase();
                }

                if (!supabaseLib) {
                    console.error('[SESSION] Nao foi possivel carregar Supabase');
                    return false;
                }

                window.supabaseClient = supabaseLib.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
                    auth: {
                        autoRefreshToken: true,
                        persistSession: true,
                        detectSessionInUrl: false
                    }
                });

                // Sincronizar com a sessao do Supabase Auth
                try {
                    const { data: { session } } = await window.supabaseClient.auth.getSession();
                    if (!session) {
                        // Supabase nao tem sessao, mas localStorage tem - tentar restaurar
                        console.log('[SESSION] Supabase sem sessao, mas localStorage tem');
                    }
                } catch (e) {
                    // Ignorar erro
                }

                supabaseInicializado = true;
                console.log('[SESSION] Supabase inicializado');
                return true;
            } catch (err) {
                console.error('[SESSION] Erro ao inicializar Supabase:', err);
                return false;
            }
        })();

        return supabaseInitPromise;
    }

    function carregarScript(src) {
        return new Promise((resolve, reject) => {
            // Verificar se o script ja existe
            const existente = document.querySelector(`script[src*="supabase"]`);
            if (existente) {
                // Aguardar carregamento
                if (detectarSupabase()) {
                    resolve();
                    return;
                }
                existente.addEventListener('load', () => resolve());
                existente.addEventListener('error', () => reject());
                return;
            }

            const script = document.createElement('script');
            script.src = src;
            script.crossOrigin = 'anonymous';
            script.onload = () => resolve();
            script.onerror = () => reject(new Error('Falha ao carregar: ' + src));
            document.head.appendChild(script);
        });
    }

    // ===== API PUBLICA =====
    const sessaoAPI = {
        // Dados do usuario logado
        get usuario() { return window.sessaoUsuario || null; },
        get clienteId() { return window.sessaoUsuario?.cliente_id || null; },
        get usuarioId() { return window.sessaoUsuario?.usuario_id || null; },
        get nome() { return window.sessaoUsuario?.nome || ''; },
        get email() { return window.sessaoUsuario?.email || ''; },
        get nivelAcesso() { return window.sessaoUsuario?.nivel_acesso || ''; },
        get authId() { return window.sessaoUsuario?.auth_id || null; },

        // Verificar se esta autenticado
        estaAutenticado() {
            return !!window.sessaoUsuario && !!window.sessaoUsuario.auth_id;
        },

        // Obter cliente Supabase (inicializa se necessario)
        async getSupabase() {
            await inicializarSupabase();
            return window.supabaseClient;
        },

        // Verificar se Supabase esta pronto
        get supabasePronto() { return supabaseInicializado; },

        // Logout unificado
        async logout() {
            console.log('[SESSION] Realizando logout...');
            try {
                if (window.supabaseClient) {
                    await window.supabaseClient.auth.signOut();
                }
            } catch (e) {
                // Ignorar erro no signOut
            }
            limparSessao();
            window.sessaoUsuario = null;
            window.authClienteId = null;
            window.authUsuario = null;
            localStorage.setItem('logoutTimestamp', Date.now());
            window.location.href = LOGIN_PAGE + '?logout=1';
        },

        // Atualizar dados da sessao
        atualizar(dados) {
            const atual = window.sessaoUsuario || {};
            const novo = { ...atual, ...dados, login_time: new Date().toISOString() };
            window.sessaoUsuario = novo;
            localStorage.setItem(SESSAO_KEY, JSON.stringify(novo));
        },

        // Verificar permissao (admin, etc)
        temPermissao(nivel) {
            return (window.sessaoUsuario?.nivel_acesso || '').toLowerCase() === nivel.toLowerCase();
        },

        // Recarregar dados do usuario do banco
        async recarregar() {
            const sb = await inicializarSupabase();
            if (!sb) return false;

            try {
                const { data: { session } } = await window.supabaseClient.auth.getSession();
                if (!session) {
                    this.logout();
                    return false;
                }

                const { data: usuario } = await window.supabaseClient
                    .from('usuarios_pg')
                    .select('*, clientes_sistema(nome, ativo, data_expiracao)')
                    .eq('auth_id', session.user.id)
                    .eq('ativo', true)
                    .single();

                if (!usuario) {
                    this.logout();
                    return false;
                }

                this.atualizar({
                    usuario_id: usuario.id,
                    nome: usuario.nome,
                    email: usuario.email,
                    cliente_id: usuario.cliente_id,
                    nivel_acesso: usuario.nivel_acesso
                });

                return true;
            } catch (e) {
                console.error('[SESSION] Erro ao recarregar:', e);
                return false;
            }
        }
    };

    // Expor globalmente
    window.sessao = sessaoAPI;
    window.sessionGuard = {
        verificar: verificarSessaoSincrona,
        inicializarSupabase: inicializarSupabase
    };

    // ===== INICIALIZACAO =====
    // 1. Verificacao sincrona IMEDIATA (antes de tudo)
    const sessaoValida = verificarSessaoSincrona();

    // 2. Se sessao valida, inicializar Supabase quando DOM estiver pronto
    if (sessaoValida && !ehPaginaPublica()) {
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                inicializarSupabase();
            });
        } else {
            // DOM ja carregou, inicializar agora
            inicializarSupabase();
        }

        // Tambem inicializar imediatamente se Supabase ja estiver disponivel
        if (detectarSupabase()) {
            inicializarSupabase();
        }
    }

    console.log('[SESSION] session.js carregado - Sessao unificada ativa');
})();
</script>

                <div class="stat-card">
                    <h4>Cidades Atendidas</h4>
                    <div class="number" id="totalCidades">0</div>
                </div>
                <div class="stat-card">
                    <h4>Regiões</h4>
                    <div class="number" id="totalRegioes">0</div>
                </div>
            </div>

            <!-- Filtros -->
            <div class="search-section">
                <h3>🔍 Filtros</h3>
                <div class="search-grid">
                    <div class="form-group">
                        <label>Buscar</label>
                        <input type="text" id="buscaEndereco" placeholder="Rua, bairro, cidade, CEP..." onkeyup="filtrarEnderecos()">
                    </div>
                    <div class="form-group">
                        <label>Cidade</label>
                        <input type="text" id="filtroCidade" placeholder="Digite a cidade..." onkeyup="filtrarEnderecos()">
                    </div>
                    <div class="form-group">
                        <label>Região</label>
                        <select id="filtroRegiao" onchange="filtrarEnderecos()">
                            <option value="">Todas</option>
                            <option value="Norte">Norte</option>
                            <option value="Sul">Sul</option>
                            <option value="Leste">Leste</option>
                            <option value="Oeste">Oeste</option>
                            <option value="Centro">Centro</option>
                            <option value="Grande Florianópolis">Grande Florianópolis</option>
                            <option value="Santa Catarina">Santa Catarina</option>
                            <option value="Outros Estados">Outros Estados</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select id="filtroStatus" onchange="filtrarEnderecos()">
                            <option value="">Todos</option>
                            <option value="ativo">Ativo</option>
                            <option value="inativo">Inativo</option>
                        </select>
                    </div>
                </div>
                <div class="filter-actions">
                    <button class="btn btn-primary" onclick="filtrarEnderecos()">🔍 Buscar</button>
                    <button class="btn btn-secondary" onclick="limparFiltros()">🧹 Limpar</button>
                    <button class="btn btn-success" onclick="abrirModal()">➕ Novo Endereço</button>
                </div>
            </div>

            <!-- Tabela -->
            <div class="table-container">
                <table id="tabelaEnderecos">
                    <thead>
                        <tr>
                            <th>Cliente</th>
                            <th>Endereço</th>
                            <th>Bairro</th>
                            <th>Cidade/UF</th>
                            <th>CEP</th>
                            <th>Região</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tbodyEnderecos">
                        <tr>
                            <td colspan="8" class="loading">
                                <div>Carregando endereços...</div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal Novo/Editar Endereço -->
    <div class="modal" id="modalEndereco">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitulo">📍 Novo Endereço</h2>
                <button class="modal-close" onclick="fecharModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="formEndereco">
                    <input type="hidden" id="enderecoId">
                    <div class="form-row">
                        <div class="form-group" style="grid-column: 1 / -1;">
                            <label>Cliente *</label>
                            <select id="clienteSelect" required>
                                <option value="">Selecione um cliente...</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>CEP</label>
                            <input type="text" id="cep" maxlength="9" placeholder="00000-000" onblur="buscarCEP()">
                        </div>
                        <div class="form-group">
                            <label>Rua *</label>
                            <input type="text" id="rua" required placeholder="Nome da rua">
                        </div>
                        <div class="form-group">
                            <label>Número</label>
                            <input type="text" id="numero" placeholder="123, S/N, etc">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Complemento</label>
                            <input type="text" id="complemento" placeholder="Apto, Bloco, Sala...">
                        </div>
                        <div class="form-group">
                            <label>Bairro</label>
                            <input type="text" id="bairro" placeholder="Nome do bairro">
                        </div>
                        <div class="form-group">
                            <label>Cidade *</label>
                            <input type="text" id="cidade" required placeholder="Nome da cidade">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Estado</label>
                            <select id="estado">
                                <option value="SC">Santa Catarina (SC)</option>
                                <option value="RS">Rio Grande do Sul (RS)</option>
                                <option value="PR">Paraná (PR)</option>
                                <option value="SP">São Paulo (SP)</option>
                                <option value="RJ">Rio de Janeiro (RJ)</option>
                                <option value="MG">Minas Gerais (MG)</option>
                                <option value="ES">Espírito Santo (ES)</option>
                                <option value="BA">Bahia (BA)</option>
                                <option value="Outro">Outro</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Região</label>
                            <select id="regiao">
                                <option value="">Selecione...</option>
                                <option value="Norte">Norte</option>
                                <option value="Sul">Sul</option>
                                <option value="Leste">Leste</option>
                                <option value="Oeste">Oeste</option>
                                <option value="Centro">Centro</option>
                                <option value="Grande Florianópolis">Grande Florianópolis</option>
                                <option value="Santa Catarina">Santa Catarina</option>
                                <option value="Outros Estados">Outros Estados</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Status</label>
                            <select id="statusEndereco">
                                <option value="ativo">Ativo</option>
                                <option value="inativo">Inativo</option>
                            </select>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
                <button class="btn btn-success" onclick="salvarEndereco()">💾 Salvar Endereço</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // ============================================
        // VARIÁVEIS GLOBAIS (auth.js fornece supabaseClient, authClienteId)
        // ============================================
        let supabaseClient = null;
        let usuarioAtual = null;
        let clienteAtual = null;
        let enderecos = [];
        let clientes = [];
        let enderecoEmEdicao = null;

        // ============================================
        // INICIALIZAÇÃO
        // ============================================
        document.addEventListener('DOMContentLoaded', async function() {
            console.log('[ENDERECOS] DOM carregado, iniciando...');

            // Aguardar auth.js inicializar
            await new Promise(resolve => {
                const check = () => {
                    if (window.supabaseClient) resolve();
                    else setTimeout(check, 100);
                };
                check();
            });

            supabaseClient = window.supabaseClient;

            // Usar auth.js para autenticação
            const session = await verificarSessao();
            if (!session) return;

            await carregarUsuarioLogado();

            usuarioAtual = window.authUsuario;
            clienteAtual = window.authClienteId;

            if (!clienteAtual) {
                mostrarToast('Erro: Cliente não identificado.', 'error');
                setTimeout(() => { location.href = v('login.html'); }, 3000);
                return;
            }

            console.log('[ENDERECOS] ✅ Autenticado. Cliente ID:', clienteAtual);

            await carregarClientes();
            await carregarEnderecos();
        });

        // ============================================
        // CARREGAR CLIENTES PARA O SELECT
        // ============================================
        async function carregarClientes() {
            try {
                const { data, error } = await supabaseClient
                    .from('clientes_pg')
                    .select('id, nome')
                    .eq('cliente_id', clienteAtual)
                    .order('nome');

                if (error) throw error;

                clientes = data || [];

                // Preencher select do modal
                const select = document.getElementById('clienteSelect');
                select.innerHTML = '<option value="">Selecione um cliente...</option>';
                clientes.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c.id;
                    opt.textContent = c.nome;
                    select.appendChild(opt);
                });
            } catch (error) {
                console.error('Erro ao carregar clientes:', error);
            }
        }

        // ============================================
        // CARREGAR ENDEREÇOS
        // ============================================
        async function carregarEnderecos() {
            try {
                const { data, error } = await supabaseClient
                    .from('enderecos_pg')
                    .select(`
                        *,
                        clientes_pg:cliente_pg_id(id, nome)
                    `)
                    .eq('cliente_id', clienteAtual)
                    .order('criado_em', { ascending: false });

                if (error) throw error;

                enderecos = data || [];
                atualizarTabela();
                atualizarEstatisticas();
            } catch (error) {
                console.error('Erro ao carregar endereços:', error);
                mostrarToast('Erro ao carregar endereços', 'error');
            }
        }

        // ============================================
        // ATUALIZAR ESTATÍSTICAS
        // ============================================
        function atualizarEstatisticas() {
            const ativos = enderecos.filter(e => e.ativo !== false).length;
            const cidades = [...new Set(enderecos.map(e => e.cidade).filter(Boolean))];
            const regioes = [...new Set(enderecos.map(e => e.regiao).filter(Boolean))];

            document.getElementById('totalEnderecos').textContent = enderecos.length;
            document.getElementById('totalAtivos').textContent = ativos;
            document.getElementById('totalCidades').textContent = cidades.length;
            document.getElementById('totalRegioes').textContent = regioes.length;
        }

        // ============================================
        // ATUALIZAR TABELA
        // ============================================
        function atualizarTabela(dados = enderecos) {
            const tbody = document.getElementById('tbodyEnderecos');

            if (dados.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="8" class="empty-state">
                            <div class="empty-state-icon">📭</div>
                            <h3>Nenhum endereço encontrado</h3>
                            <p>Cadastre um novo endereço clicando no botão acima.</p>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = dados.map(e => {
                const cliente = e.clientes_pg || {};
                const enderecoCompleto = `${e.rua || ''}, ${e.numero || 'S/N'}${e.complemento ? ' - ' + e.complemento : ''}`;
                const isAtivo = e.ativo !== false;

                return `
                    <tr>
                        <td><strong>${cliente.nome || 'N/A'}</strong></td>
                        <td>${enderecoCompleto}</td>
                        <td>${e.bairro || '-'}</td>
                        <td>${e.cidade || '-'}/${e.estado || 'SC'}</td>
                        <td>${formatarCEP(e.cep)}</td>
                        <td>${e.regiao || '-'}</td>
                        <td>
                            <span class="badge ${isAtivo ? 'badge-ativo' : 'badge-inativo'}">
                                ${isAtivo ? 'Ativo' : 'Inativo'}
                            </span>
                        </td>
                        <td class="actions-cell">
                            <button class="btn-small btn-edit" onclick="editarEndereco('${e.id}')">✏️</button>
                            <button class="btn-small btn-delete" onclick="excluirEndereco('${e.id}')">🗑️</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // ============================================
        // FILTROS
        // ============================================
        function filtrarEnderecos() {
            const busca = document.getElementById('buscaEndereco').value.toLowerCase();
            const cidade = document.getElementById('filtroCidade').value.toLowerCase();
            const regiao = document.getElementById('filtroRegiao').value;
            const status = document.getElementById('filtroStatus').value;

            let filtrados = enderecos.filter(e => {
                const cliente = e.clientes_pg || {};
                const matchBusca = !busca || 
                    (e.rua && e.rua.toLowerCase().includes(busca)) ||
                    (e.bairro && e.bairro.toLowerCase().includes(busca)) ||
                    (e.cidade && e.cidade.toLowerCase().includes(busca)) ||
                    (e.cep && e.cep.includes(busca)) ||
                    (cliente.nome && cliente.nome.toLowerCase().includes(busca));

                const matchCidade = !cidade || (e.cidade && e.cidade.toLowerCase().includes(cidade));
                const matchRegiao = !regiao || e.regiao === regiao;
                const matchStatus = !status || 
                    (status === 'ativo' && e.ativo !== false) ||
                    (status === 'inativo' && e.ativo === false);

                return matchBusca && matchCidade && matchRegiao && matchStatus;
            });

            atualizarTabela(filtrados);
        }

        function limparFiltros() {
            document.getElementById('buscaEndereco').value = '';
            document.getElementById('filtroCidade').value = '';
            document.getElementById('filtroRegiao').value = '';
            document.getElementById('filtroStatus').value = '';
            atualizarTabela(enderecos);
        }

        // ============================================
        // MODAL
        // ============================================
        function abrirModal(enderecoId = null) {
            enderecoEmEdicao = enderecoId;
            const modal = document.getElementById('modalEndereco');
            const titulo = document.getElementById('modalTitulo');
            const form = document.getElementById('formEndereco');

            form.reset();
            document.getElementById('enderecoId').value = '';
            document.getElementById('statusEndereco').value = 'ativo';
            document.getElementById('estado').value = 'SC';

            if (enderecoId) {
                const endereco = enderecos.find(e => e.id === enderecoId);
                if (endereco) {
                    titulo.textContent = '✏️ Editar Endereço';
                    document.getElementById('enderecoId').value = endereco.id;
                    document.getElementById('clienteSelect').value = endereco.cliente_pg_id || '';
                    document.getElementById('cep').value = endereco.cep || '';
                    document.getElementById('rua').value = endereco.rua || '';
                    document.getElementById('numero').value = endereco.numero || '';
                    document.getElementById('complemento').value = endereco.complemento || '';
                    document.getElementById('bairro').value = endereco.bairro || '';
                    document.getElementById('cidade').value = endereco.cidade || '';
                    document.getElementById('estado').value = endereco.estado || 'SC';
                    document.getElementById('regiao').value = endereco.regiao || '';
                    document.getElementById('statusEndereco').value = endereco.ativo === false ? 'inativo' : 'ativo';
                }
            } else {
                titulo.textContent = '📍 Novo Endereço';
            }

            modal.classList.add('active');
        }

        function fecharModal() {
            document.getElementById('modalEndereco').classList.remove('active');
            enderecoEmEdicao = null;
        }

        // ============================================
        // BUSCAR CEP (ViaCEP)
        // ============================================
        async function buscarCEP() {
            const cep = document.getElementById('cep').value.replace(/\D/g, '');
            if (cep.length !== 8) return;

            try {
                const response = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                const data = await response.json();

                if (data.erro) {
                    mostrarToast('CEP não encontrado', 'warning');
                    return;
                }

                document.getElementById('rua').value = data.logradouro || '';
                document.getElementById('bairro').value = data.bairro || '';
                document.getElementById('cidade').value = data.localidade || '';
                document.getElementById('estado').value = data.uf || 'SC';
                document.getElementById('complemento').focus();

                mostrarToast('Endereço preenchido automaticamente!', 'success');
            } catch (error) {
                console.error('Erro ao buscar CEP:', error);
            }
        }

        // ============================================
        // SALVAR ENDEREÇO
        // ============================================
        async function salvarEndereco() {
            const clientePgId = document.getElementById('clienteSelect').value;
            if (!clientePgId) {
                mostrarToast('Selecione um cliente', 'error');
                return;
            }

            const rua = document.getElementById('rua').value.trim();
            const cidade = document.getElementById('cidade').value.trim();
            if (!rua || !cidade) {
                mostrarToast('Rua e cidade são obrigatórios', 'error');
                return;
            }

            const dados = {
                cliente_id: clienteAtual,
                cliente_pg_id: clientePgId,
                cep: document.getElementById('cep').value.trim(),
                rua: rua,
                numero: document.getElementById('numero').value.trim() || null,
                complemento: document.getElementById('complemento').value.trim() || null,
                bairro: document.getElementById('bairro').value.trim() || null,
                cidade: cidade,
                estado: document.getElementById('estado').value,
                regiao: document.getElementById('regiao').value || null,
                ativo: document.getElementById('statusEndereco').value === 'ativo',
                atualizado_em: new Date().toISOString()
            };

            try {
                if (enderecoEmEdicao) {
                    const { error } = await supabaseClient
                        .from('enderecos_pg')
                        .update(dados)
                        .eq('id', enderecoEmEdicao);
                    if (error) throw error;
                    mostrarToast('Endereço atualizado com sucesso!', 'success');
                } else {
                    dados.criado_em = new Date().toISOString();
                    const { error } = await supabaseClient
                        .from('enderecos_pg')
                        .insert([dados]);
                    if (error) throw error;
                    mostrarToast('Endereço cadastrado com sucesso!', 'success');
                }

                fecharModal();
                await carregarEnderecos();
            } catch (error) {
                console.error('Erro ao salvar:', error);
                mostrarToast('Erro ao salvar endereço: ' + error.message, 'error');
            }
        }

        // ============================================
        // EDITAR E EXCLUIR
        // ============================================
        function editarEndereco(id) {
            abrirModal(id);
        }

        async function excluirEndereco(id) {
            if (!confirm('Tem certeza que deseja excluir este endereço?')) return;

            try {
                const { error } = await supabaseClient
                    .from('enderecos_pg')
                    .delete()
                    .eq('id', id);

                if (error) throw error;

                mostrarToast('Endereço excluído com sucesso!', 'success');
                await carregarEnderecos();
            } catch (error) {
                console.error('Erro ao excluir:', error);
                mostrarToast('Erro ao excluir endereço', 'error');
            }
        }

        // ============================================
        // UTILITÁRIOS
        // ============================================
        function formatarCEP(cep) {
            if (!cep) return '-';
            const limpo = cep.toString().replace(/\D/g, '');
            return limpo.length === 8 
                ? limpo.replace(/(\d{5})(\d{3})/, '$1-$2') 
                : cep;
        }

        function mostrarToast(mensagem, tipo = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = mensagem;
            toast.className = `toast ${tipo} show`;
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Fechar modal ao clicar fora
        document.getElementById('modalEndereco').addEventListener('click', function(e) {
            if (e.target === this) fecharModal();
        });

        // Máscara CEP
        document.getElementById('cep').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 8) value = value.slice(0, 8);
            if (value.length > 5) value = value.replace(/(\d{5})(\d)/, '$1-$2');
            e.target.value = value;
        });
    </script>
    <script src="navmenu.js"></script>
</body>
</html>
